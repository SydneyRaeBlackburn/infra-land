# deployment values
deployment:
  replicas: 1
  image: 
    repository: test-app
    tag: "" # set in Chart
    pullPolicy: IfNotPresent
  port: 8080
  portName: http
  protocol: TCP
  HTTPpath: /
  autoPromote: false
  scaleDownDelaySeconds: 30

# service values
service:
  protocol: TCP
  port: 80
  targetPort: 8080
  type: NodePort

# virtualService values
vsvc:
  hosts: [ "test-app.local" ]
  http:
    name: primary
    stableHost: test-app-stable
    stableWeight: 100
    canaryHost: test-app-canary
    canaryWeight: 0

# gateway values
gateway:
  istio: istio-ingressgateway
  port: 80
  portName: http
  protocol: HTTP
  hosts: ["*"]
