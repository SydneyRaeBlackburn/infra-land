apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  labels:
    app: api-deployment
spec:
  replicas: 4
  selector:
    matchLabels:
      app: api-deployment
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  template:
    metadata:
      labels:
        app: api-deployment
    spec:
      containers:
        - name: api-deployment
          image: recreate-api:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
          - containerPort: 8080
          env:
          - name: PORT
            value: "8080"
          - name: SERVER_NAME
            value: backend-api
          - name: DEPLOYMENT_STRATEGY
            value: recreate